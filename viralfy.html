<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Viralfy — AI Video Generator</title>
  <!-- React + ReactDOM -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <!-- Babel for in-browser JSX transpilation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    /* Minimal reset so page doesn't flash before React mounts */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060608; color: #F0F0F5; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    /* ─────────────────────────── STYLES ─────────────────────────── */
    const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#060608;--s1:#101014;--s2:#17171d;--s3:#1f1f28;
  --red:#FF2D55;--org:#FF6B00;--tk:#00F2EA;--grn:#2ECC71;--pur:#9B59B6;
  --txt:#F0F0F5;--mut:#55556A;--bdr:#1e1e28;
  --glow:0 0 40px rgba(255,45,85,.28);--glow-tk:0 0 30px rgba(0,242,234,.2);
}
html,body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* ── NAV ── */
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:rgba(6,6,8,.97);backdrop-filter:blur(20px);z-index:200;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;background:linear-gradient(135deg,#FF2D55,#FF6B00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo em{-webkit-text-fill-color:var(--txt);font-style:normal;}
.nav-r{display:flex;align-items:center;gap:10px;}
.pro-chip{font-family:'Space Mono',monospace;font-size:10px;background:linear-gradient(135deg,#FF2D55,#FF6B00);padding:5px 12px;border-radius:20px;cursor:pointer;border:none;color:#fff;letter-spacing:.5px;transition:.2s;}
.pro-chip:hover{opacity:.85;transform:scale(1.04);}
.free-chip{font-family:'Space Mono',monospace;font-size:10px;background:var(--s2);border:1px solid var(--bdr);padding:5px 12px;border-radius:20px;color:var(--mut);}
.av-btn{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#FF2D55,#FF6B00);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;flex-shrink:0;transition:.2s;}
.av-btn:hover{transform:scale(1.08);}
.ndot{position:absolute;top:-1px;right:-1px;width:9px;height:9px;background:var(--red);border-radius:50%;border:2px solid var(--bg);}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(6,6,8,.97);backdrop-filter:blur(20px);border-top:1px solid var(--bdr);display:flex;padding:8px 0 20px;z-index:200;}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;border:none;background:transparent;transition:.2s;}
.btab-icon{font-size:19px;line-height:1;}
.btab-lbl{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.5px;color:var(--mut);text-transform:uppercase;}
.btab.on .btab-lbl{color:var(--red);}
.btab-dot{width:4px;height:4px;border-radius:50%;background:var(--red);opacity:0;margin-top:1px;}
.btab.on .btab-dot{opacity:1;}
.pb{padding-bottom:90px;}

/* ── HERO ── */
.hero{text-align:center;padding:44px 24px 24px;}
.hbadge{display:inline-flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--red);text-transform:uppercase;margin-bottom:18px;background:rgba(255,45,85,.08);border:1px solid rgba(255,45,85,.2);padding:6px 14px;border-radius:30px;}
.pulse{width:6px;height:6px;background:var(--red);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(1.7);}}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(50px,11vw,88px);line-height:.92;letter-spacing:2px;margin-bottom:16px;}
.grad{background:linear-gradient(135deg,#FF2D55,#FF6B00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;}
.hero-sub{color:var(--mut);font-size:13px;max-width:360px;margin:0 auto 24px;line-height:1.7;font-weight:300;}
.pbadges{display:flex;justify-content:center;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
.pbadge{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:8px;border:1px solid var(--bdr);background:var(--s2);font-size:11px;font-weight:500;}
.pbadge.tk{border-color:rgba(0,242,234,.3);color:var(--tk);}
.pbadge.yt{border-color:rgba(255,0,0,.3);color:#ff6666;}
.pbadge.ig{border-color:rgba(225,48,108,.3);color:#E1306C;}

/* ── PROMPT BOX ── */
.pwrap{max-width:640px;margin:0 auto;padding:0 20px 40px;}
.pbox{background:var(--s1);border:1px solid var(--bdr);border-radius:18px;padding:4px;transition:.3s;}
.pbox:focus-within{border-color:var(--red);box-shadow:var(--glow);}
.pinr{display:flex;align-items:flex-end;gap:8px;}
.pinput{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:16px;padding:16px 16px 12px;resize:none;min-height:58px;max-height:120px;line-height:1.5;}
.pinput::placeholder{color:var(--mut);}
.gbtn{margin:8px;padding:14px 20px;background:linear-gradient(135deg,#FF2D55,#FF6B00);border:none;border-radius:12px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:.2s;}
.gbtn:hover:not(:disabled){transform:scale(1.04);box-shadow:var(--glow);}
.gbtn:disabled{opacity:.5;cursor:not-allowed;}

/* ── QUICK TOOLS ── */
.quick-tools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
.qtool{display:flex;align-items:center;gap:9px;padding:12px 14px;border-radius:12px;border:1px solid var(--bdr);background:var(--s1);cursor:pointer;transition:.2s;text-align:left;}
.qtool:hover{border-color:var(--red);background:rgba(255,45,85,.05);}
.qtool-icon{font-size:20px;flex-shrink:0;}
.qtool-label{font-size:12px;font-weight:600;color:var(--txt);}
.qtool-sub{font-size:10px;color:var(--mut);margin-top:1px;}

.srow{display:flex;gap:8px;margin-top:14px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.spill{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--bdr);background:var(--s2);cursor:pointer;font-size:12px;color:var(--mut);transition:.2s;}
.spill.on{border-color:var(--red);color:var(--txt);background:rgba(255,45,85,.1);}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px;}
.chip{font-size:12px;background:var(--s2);border:1px solid var(--bdr);border-radius:20px;padding:5px 12px;cursor:pointer;color:var(--mut);transition:.2s;}
.chip:hover{border-color:var(--red);color:var(--txt);}
.cbar{display:flex;align-items:center;justify-content:space-between;background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:10px 16px;margin-top:13px;}
.clbl{color:var(--mut);font-family:'Space Mono',monospace;font-size:10px;}
.cdots{display:flex;gap:5px;}
.cdot{width:10px;height:10px;border-radius:50%;border:1px solid var(--bdr);background:var(--s2);}
.cdot.on{background:var(--red);border-color:var(--red);box-shadow:0 0 6px var(--red);}

/* ── LOADING SCREEN ── */
.lscreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;background:var(--bg);}
.licon{font-size:52px;margin-bottom:22px;animation:bob 1.2s ease infinite;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.ltitle{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;margin-bottom:8px;color:var(--red);}
.lsub{font-size:13px;color:var(--mut);margin-bottom:32px;}
.lsteps{display:flex;flex-direction:column;gap:10px;width:100%;max-width:360px;margin-bottom:28px;}
.lstep{display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--s1);border:1px solid var(--bdr);border-radius:12px;font-size:13px;color:var(--mut);text-align:left;transition:.4s;}
.lstep.active{border-color:var(--red);color:var(--txt);background:rgba(255,45,85,.06);}
.lstep.done{border-color:var(--grn);color:var(--grn);background:rgba(46,204,113,.06);}
.lstep-i{font-size:17px;flex-shrink:0;width:24px;text-align:center;}
.lbar{width:100%;max-width:360px;height:3px;background:var(--bdr);border-radius:3px;overflow:hidden;}
.lfill{height:100%;background:linear-gradient(90deg,#FF2D55,#FF6B00);border-radius:3px;transition:width .6s ease;}
.lpct{font-family:'Space Mono',monospace;font-size:11px;color:var(--mut);margin-top:8px;}

/* ── PREVIEW SCREEN ── */
.pscreen{min-height:100vh;background:var(--bg);padding-bottom:40px;animation:fadeUp .4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.ps-top{padding:18px 20px 0;display:flex;align-items:center;gap:14px;}
.ps-back{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:8px 14px;font-family:'Space Mono',monospace;font-size:11px;color:var(--txt);cursor:pointer;transition:.2s;}
.ps-back:hover{border-color:var(--red);}
.ps-ttl{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ps-body{max-width:500px;margin:0 auto;padding:22px 20px;}

/* ── PHONE MOCKUP ── */
.phone-wrap{display:flex;justify-content:center;margin-bottom:24px;}
.phone{width:185px;background:#0a0a0c;border:2px solid #252530;border-radius:32px;padding:9px;box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04);}
.phone-notch{width:48px;height:5px;background:#252530;border-radius:3px;margin:0 auto 9px;}
.phone-screen{border-radius:20px;overflow:hidden;aspect-ratio:9/16;position:relative;background:#0a0a12;}
.phone-screen canvas{width:100%;height:100%;display:block;}
.phone-tktk{position:absolute;right:7px;bottom:32px;display:flex;flex-direction:column;gap:5px;align-items:center;z-index:3;pointer-events:none;}
.phone-tktk-b{font-size:14px;line-height:1;}
.phone-tktk-c{font-family:'Space Mono',monospace;font-size:8px;color:rgba(255,255,255,.6);}

/* ── RESULT META ── */
.score-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px;}
.score-lbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--mut);letter-spacing:1px;margin-bottom:4px;}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:38px;background:linear-gradient(135deg,#FF2D55,#FF6B00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.dur-num{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--org);}
.mtags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
.mtag{font-family:'Space Mono',monospace;font-size:10px;padding:4px 10px;border-radius:5px;background:var(--s2);border:1px solid var(--bdr);color:var(--mut);}
.mtag.hi{border-color:var(--org);color:var(--org);}
.mtag.teal{border-color:var(--tk);color:var(--tk);}

/* ── MUSIC ROW ── */
.mrow{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--s1);border:1px solid var(--bdr);border-radius:10px;margin-bottom:12px;}
.minfo{flex:1;}.mname{font-size:13px;font-weight:500;}.mdesc{font-size:11px;color:var(--mut);margin-top:2px;}
.wform{display:flex;gap:2px;align-items:center;height:20px;}
.wb{width:3px;background:var(--red);border-radius:2px;animation:wv 1.2s ease infinite;}
.wb:nth-child(1){height:7px;animation-delay:0s;}.wb:nth-child(2){height:13px;animation-delay:.1s;}.wb:nth-child(3){height:9px;animation-delay:.2s;}.wb:nth-child(4){height:17px;animation-delay:.3s;}.wb:nth-child(5){height:11px;animation-delay:.4s;}.wb:nth-child(6){height:15px;animation-delay:.5s;}.wb:nth-child(7){height:7px;animation-delay:.6s;}
@keyframes wv{0%,100%{transform:scaleY(1);}50%{transform:scaleY(.4);}}

/* ── SCRIPT CARD ── */
.scard{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;margin-bottom:12px;}
.scard-h{padding:11px 16px;background:var(--s2);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;}
.scard-b{padding:16px;}
.si{display:flex;gap:12px;margin-bottom:12px;}
.si:last-child{margin-bottom:0;}
.sn{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--red);flex-shrink:0;width:22px;line-height:1.2;}
.st{font-family:'Space Mono',monospace;font-size:10px;color:var(--org);margin-bottom:3px;}
.sv{font-size:13px;line-height:1.55;}
.sc{font-size:11px;color:var(--mut);margin-top:3px;font-style:italic;}

/* ── HASHTAGS ── */
.htags{display:flex;flex-wrap:wrap;gap:6px;padding:12px 14px;background:var(--s1);border:1px solid var(--bdr);border-radius:10px;margin-bottom:18px;}
.htag{font-family:'Space Mono',monospace;font-size:11px;color:var(--tk);background:rgba(0,242,234,.08);padding:3px 8px;border-radius:4px;cursor:pointer;transition:.2s;}
.htag:hover{background:rgba(0,242,234,.16);}

/* ── CLIP TOOLS ── */
.clip-tools-section{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:16px;margin-bottom:12px;}
.clip-tools-header{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.clip-tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ctool{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;border:1px solid var(--bdr);background:var(--s2);cursor:pointer;transition:.2s;}
.ctool:hover{border-color:var(--tk);background:rgba(0,242,234,.06);}
.ctool.on{border-color:var(--tk);background:rgba(0,242,234,.1);}
.ctool-icon{font-size:16px;flex-shrink:0;}
.ctool-label{font-size:11px;font-weight:600;color:var(--txt);}
.ctool-sub{font-size:9px;color:var(--mut);margin-top:1px;}

/* ── EXPORT ── */
.exp-section{display:flex;flex-direction:column;gap:10px;}
.exp-lbl{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--mut);text-transform:uppercase;margin-bottom:2px;}
.ebtn{width:100%;padding:16px;border-radius:14px;border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:10px;transition:.2s;}
.ebtn:disabled{opacity:.55;cursor:not-allowed;}
.ebtn.epro{background:linear-gradient(135deg,#FF2D55,#FF6B00);color:#fff;}
.ebtn.epro:not(:disabled):hover{box-shadow:var(--glow);transform:translateY(-1px);}
.ebtn.efree{background:var(--s1);border:1px solid var(--bdr);color:var(--txt);font-size:15px;}
.ebtn.efree:not(:disabled):hover{border-color:var(--mut);}
.ebtn.eclips{background:var(--s2);border:2px solid var(--tk);color:var(--tk);font-size:15px;}
.ebtn.eclips:hover{background:rgba(0,242,234,.1);box-shadow:var(--glow-tk);}
.ebtn.ereset{background:transparent;border:1px solid var(--bdr);color:var(--mut);font-size:14px;padding:12px;}
.exp-note{font-size:11px;color:var(--mut);text-align:center;font-family:'Space Mono',monospace;}
.exp-note span{color:var(--org);cursor:pointer;}

/* ── RENDER PROGRESS ── */
.rprog{background:var(--s1);border:1px solid var(--bdr);border-radius:12px;padding:14px;}
.rprog-lbl{font-family:'Space Mono',monospace;font-size:11px;color:var(--red);margin-bottom:10px;letter-spacing:1px;}
.rprog-bar{height:3px;background:var(--bdr);border-radius:3px;overflow:hidden;margin-bottom:6px;}
.rprog-fill{height:100%;background:linear-gradient(90deg,#FF2D55,#FF6B00);border-radius:3px;transition:width .3s ease;}
.rprog-pct{font-family:'Space Mono',monospace;font-size:10px;color:var(--mut);}

/* ── MODALS ── */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--s1);border:1px solid #252530;border-radius:28px 28px 0 0;padding:24px 24px 48px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(50px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.mhandle{width:36px;height:4px;background:#2a2a36;border-radius:2px;margin:0 auto 24px;}
.mtitle{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;margin-bottom:6px;}
.msub{font-size:14px;color:var(--mut);margin-bottom:20px;line-height:1.6;}

/* auth */
.abtn{width:100%;padding:15px;border-radius:12px;border:1px solid var(--bdr);background:var(--s2);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:10px;transition:.2s;}
.abtn:hover{border-color:#444;background:var(--s3);}
.abtn.google{border-color:rgba(66,133,244,.4);background:rgba(66,133,244,.07);}
.abtn.tktk{border-color:rgba(0,242,234,.35);background:rgba(0,242,234,.06);}
.ai{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.dvdr{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--mut);font-size:12px;}
.dvdr::before,.dvdr::after{content:'';flex:1;height:1px;background:var(--bdr);}
.ef{width:100%;padding:13px 16px;background:var(--s2);border:1px solid var(--bdr);border-radius:10px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:10px;transition:.2s;}
.ef::placeholder{color:var(--mut);}
.ef:focus{border-color:var(--red);}
.acta{width:100%;padding:15px;background:linear-gradient(135deg,#FF2D55,#FF6B00);border:none;border-radius:12px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1px;cursor:pointer;margin-bottom:10px;display:block;transition:.2s;}
.acta:hover{opacity:.9;}
.aswitch{text-align:center;font-size:13px;color:var(--mut);cursor:pointer;margin-bottom:4px;}
.aswitch span{color:var(--red);}
.dismiss{width:100%;padding:12px;background:transparent;border:none;color:var(--mut);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;display:block;}
.mcta{width:100%;padding:16px;background:linear-gradient(135deg,#FF2D55,#FF6B00);border:none;border-radius:12px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;cursor:pointer;margin-bottom:10px;display:block;transition:.2s;}
.mcta:hover{opacity:.9;}

/* pro plans */
.perks{list-style:none;display:flex;flex-direction:column;gap:7px;margin:14px 0;}
.perks li{display:flex;align-items:center;gap:9px;font-size:13px;}
.perks li::before{content:'✓';color:var(--grn);font-weight:700;font-size:12px;}
.pcards{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.pcard{border:1px solid var(--bdr);border-radius:14px;padding:16px;position:relative;}
.pcard.pop{border-color:var(--red);background:rgba(255,45,85,.05);}
.pbadge2{position:absolute;top:-10px;left:16px;background:var(--red);font-family:'Space Mono',monospace;font-size:10px;padding:3px 10px;border-radius:10px;letter-spacing:1px;color:#fff;}
.pname{font-weight:600;font-size:15px;margin-bottom:2px;}
.pprice{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;}
.pprice small{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--mut);font-weight:300;}
.pperks{font-size:12px;color:var(--mut);margin-top:4px;}

/* clips modal */
.clips-info{background:rgba(0,242,234,.06);border:1px solid rgba(0,242,234,.2);border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px;color:var(--tk);line-height:1.5;}
.clips-count{font-family:'Space Mono',monospace;font-size:10px;color:var(--mut);margin-bottom:12px;}
.clips-count span{color:var(--tk);}
.clips-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.clip-slot{aspect-ratio:9/16;border-radius:10px;border:2px dashed var(--bdr);background:var(--s2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:.2s;}
.clip-slot:hover{border-color:var(--tk);background:rgba(0,242,234,.05);}
.clip-slot.filled{border-style:solid;border-color:var(--tk);}
.clip-slot img,.clip-slot video{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.clip-slot-icon{font-size:22px;margin-bottom:4px;z-index:1;}
.clip-slot-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--mut);z-index:1;text-align:center;padding:0 6px;}
.clip-remove{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:rgba(255,45,85,.9);border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;line-height:1;}
.clip-scene-lbl{position:absolute;bottom:5px;left:5px;font-family:'Space Mono',monospace;font-size:8px;color:var(--tk);background:rgba(0,0,0,.7);padding:2px 5px;border-radius:3px;z-index:10;}

/* transitions selector */
.trans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.trans-opt{padding:10px 8px;border-radius:10px;border:1px solid var(--bdr);background:var(--s2);cursor:pointer;transition:.2s;text-align:center;}
.trans-opt:hover{border-color:var(--tk);}
.trans-opt.on{border-color:var(--tk);background:rgba(0,242,234,.1);}
.trans-opt-icon{font-size:20px;margin-bottom:4px;}
.trans-opt-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--txt);letter-spacing:.5px;}

/* caption style selector */
.cap-styles{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
.cap-style{padding:12px;border-radius:10px;border:1px solid var(--bdr);background:var(--s2);cursor:pointer;transition:.2s;}
.cap-style:hover{border-color:var(--red);}
.cap-style.on{border-color:var(--red);background:rgba(255,45,85,.08);}
.cap-preview{font-size:12px;font-weight:700;margin-bottom:4px;}
.cap-name{font-family:'Space Mono',monospace;font-size:9px;color:var(--mut);}

/* ── PAGES ── */
.page{padding:24px 20px 100px;animation:fadeUp .3s ease;}
.ptitle{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;margin-bottom:5px;}
.psub{font-size:13px;color:var(--mut);margin-bottom:20px;}

/* trending */
.trow{display:flex;flex-direction:column;gap:10px;}
.tcard{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.2s;}
.tcard:hover{border-color:var(--red);background:var(--s2);}
.trank{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--red);flex-shrink:0;width:34px;line-height:1;}
.tinfo{flex:1;}.ttitle{font-size:14px;font-weight:600;margin-bottom:3px;}.tmeta{font-size:11px;color:var(--mut);font-family:'Space Mono',monospace;}
.tuse{font-size:11px;padding:7px 12px;border-radius:7px;background:rgba(255,45,85,.1);border:1px solid rgba(255,45,85,.3);color:var(--red);cursor:pointer;font-weight:600;flex-shrink:0;transition:.2s;}
.tuse:hover{background:rgba(255,45,85,.2);}

/* videos grid */
.vgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.vt{aspect-ratio:9/16;border-radius:10px;position:relative;overflow:hidden;cursor:pointer;border:1px solid var(--bdr);transition:.2s;}
.vt:hover{border-color:var(--red);transform:scale(1.02);}
.vo{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;}
.vttl{font-family:'Bebas Neue',sans-serif;font-size:11px;color:#fff;line-height:1.2;}
.vvws{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,.55);margin-top:2px;}
.vb{position:absolute;top:7px;left:7px;font-family:'Space Mono',monospace;font-size:9px;padding:2px 6px;border-radius:4px;}
.vb.tk{background:rgba(0,242,234,.2);color:var(--tk);border:1px solid rgba(0,242,234,.3);}
.vb.yt{background:rgba(255,0,0,.2);color:#ff6666;border:1px solid rgba(255,0,0,.3);}
.g1{background:linear-gradient(135deg,#1a0a2e,#2d1645,#0f0a1a);}
.g2{background:linear-gradient(135deg,#2d1b1b,#3d1515,#5a1a1a);}
.g3{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);}
.g4{background:linear-gradient(135deg,#1a2a1a,#162616,#0f3a10);}
.g5{background:linear-gradient(135deg,#1f0a1f,#2d0a3a,#40096e);}
.g6{background:linear-gradient(135deg,#1a1500,#2d2200,#5a4400);}
.g7{background:linear-gradient(135deg,#001a2e,#002d4a,#004080);}
.g8{background:linear-gradient(135deg,#0d1f0d,#1a3a1a,#0a2a0a);}
.g9{background:linear-gradient(135deg,#2a0a1a,#4a0a30,#2d0035);}

/* ── EXPLORE PAGE ── */
.explore-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.explore-filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:16px;}
.efilter{flex-shrink:0;font-family:'Space Mono',monospace;font-size:10px;padding:5px 12px;border-radius:20px;border:1px solid var(--bdr);background:var(--s2);color:var(--mut);cursor:pointer;transition:.2s;letter-spacing:.5px;}
.efilter.on{border-color:var(--red);color:var(--txt);background:rgba(255,45,85,.1);}
.explore-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.explore-card{border-radius:14px;overflow:hidden;position:relative;cursor:pointer;border:1px solid var(--bdr);transition:.2s;background:var(--s1);}
.explore-card:hover{border-color:var(--red);transform:scale(1.01);}
.explore-thumb{aspect-ratio:9/16;position:relative;overflow:hidden;}
.explore-thumb-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.explore-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.explore-play-btn{width:40px;height:40px;background:rgba(255,255,255,.18);backdrop-filter:blur(6px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;border:1.5px solid rgba(255,255,255,.3);}
.explore-info{padding:10px 12px;}
.explore-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.5px;margin-bottom:4px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.explore-meta{display:flex;align-items:center;justify-content:space-between;}
.explore-user{font-size:11px;color:var(--mut);}
.explore-stats{display:flex;align-items:center;gap:8px;}
.explore-stat{font-family:'Space Mono',monospace;font-size:9px;color:var(--mut);}
.explore-badge{position:absolute;top:7px;right:7px;font-family:'Space Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;background:rgba(0,0,0,.65);}
.explore-badge.hot{color:var(--red);border:1px solid rgba(255,45,85,.4);}
.explore-badge.new{color:var(--tk);border:1px solid rgba(0,242,234,.4);}
.explore-badge.tr{color:var(--org);border:1px solid rgba(255,107,0,.4);}

.empty{text-align:center;padding:48px 20px;}

@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

    function safeRoundRect(ctx, x, y, w, h, r) {
      if (ctx.roundRect) {
        ctx.roundRect(x, y, w, h, r);
      } else {
        const cr = Math.min(r, w/2, h/2);
        ctx.moveTo(x + cr, y);
        ctx.lineTo(x + w - cr, y);
        ctx.arcTo(x + w, y, x + w, y + cr, cr);
        ctx.lineTo(x + w, y + h - cr);
        ctx.arcTo(x + w, y + h, x + w - cr, y + h, cr);
        ctx.lineTo(x + cr, y + h);
        ctx.arcTo(x, y + h, x, y + h - cr, cr);
        ctx.lineTo(x, y + cr);
        ctx.arcTo(x, y, x + cr, y, cr);
        ctx.closePath();

    function wrapText(ctx, text, maxWidth) {
      if (!text) return [""];
      const words = text.split(" ");
      const lines = [];
      let current = "";
      for (const w of words) {
        const test = current ? current + " " + w : w;
        if (ctx.measureText(test).width > maxWidth && current) {
          lines.push(current);
          current = w;
        } else {
          current = test;
        }
      }

      return lines.length ? lines : [""];

      return <canvas ref={ref} width={270} height={480} style={{width:"100%",height:"100%",display:"block"}} />;
    }

    /* ─────────────────────────── VIDEO RENDERER ─────────────────────────── */
    async function renderVideo(result, watermark, onPct, clips, captionStyle, transition) {
      const W = 1080, H = 1920, FPS = 24;
      const FRAME_MS = 1000 / FPS;

      const canvas = document.createElement("canvas");
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext("2d");

      const loadedImgs = [];
      for (let i = 0; i < result.scenes.length; i++) {
        const c = clips && clips[i];
        if (c && c.type === "image" && c.url) {
          await new Promise(res => {
            const img = new Image();
            const timer = setTimeout(() => { loadedImgs[i] = null; res(); }, 4000);
            img.onload = () => { clearTimeout(timer); loadedImgs[i] = img; res(); };
            img.onerror = () => { clearTimeout(timer); loadedImgs[i] = null; res(); };
            img.src = c.url;
          });
        } else {
          loadedImgs[i] = null;
        }
      }

      const mimes = ["video/webm;codecs=vp8","video/webm;codecs=vp9","video/webm"];
      let mime = "video/webm";
      for (const m of mimes) {
        try { if (MediaRecorder.isTypeSupported(m)) { mime = m; break; } } catch(e) {}
      }

      const stream = canvas.captureStream(FPS);
      const chunks = [];
      const recOpts = { mimeType: mime };
      if (mime.includes("vp8") || mime.includes("vp9")) recOpts.videoBitsPerSecond = 2_500_000;
      const rec = new MediaRecorder(stream, recOpts);
      rec.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
      rec.start(100);

      const durs = result.scenes.map(sc => {
        const m = sc.timing && sc.timing.match(/(\d+):(\d+)-(\d+):(\d+)/);
        if (m) return Math.max(2, parseInt(m[3])*60+parseInt(m[4]) - parseInt(m[1])*60 - parseInt(m[2]));
        return 7;
      });
      const totalFrames = durs.reduce((a, b) => a + b, 0) * FPS;
      let done = 0;

      for (let si = 0; si < result.scenes.length; si++) {
        const scene = result.scenes[si];
        const pal = PALETTES[si % PALETTES.length];
        const sceneFr = durs[si] * FPS;
        const img = loadedImgs[si];

        for (let f = 0; f < sceneFr; f++) {
          const frameStart = performance.now();
          const t = f / FPS;
          const prog = f / sceneFr;

          ctx.clearRect(0, 0, W, H);

          if (img) {
            ctx.drawImage(img, 0, 0, W, H);
            const ov = ctx.createLinearGradient(0, 0, 0, H);
            ov.addColorStop(0, "rgba(0,0,0,0.3)");
            ov.addColorStop(1, "rgba(0,0,0,0.65)");
            ctx.fillStyle = ov; ctx.fillRect(0, 0, W, H);
          } else {
            const grd = ctx.createLinearGradient(0, 0, W * 0.6, H);
            grd.addColorStop(0, pal.bg1); grd.addColorStop(1, pal.bg2);
            ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);

            ctx.globalAlpha = 0.12;
            const pulseR = 320 + Math.sin(t * 1.8) * 40;
            const radGrd = ctx.createRadialGradient(W/2, H*0.45, 0, W/2, H*0.45, pulseR);
            radGrd.addColorStop(0, pal.accent);
            radGrd.addColorStop(1, "transparent");
            ctx.fillStyle = radGrd;
            ctx.beginPath();
            ctx.arc(W/2, H*0.45, pulseR, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1;
          }

          if (transition && transition !== "none") {
            const fadeZone = 0.1;
            let tfAlpha = 0;
            const color = transition === "flash" ? "255,255,255" : "0,0,0";
            if (prog < fadeZone) tfAlpha = (1 - prog/fadeZone) * (transition==="flash" ? 0.55 : 1);
            else if (prog > 1 - fadeZone) tfAlpha = ((prog-(1-fadeZone))/fadeZone) * (transition==="flash" ? 0.55 : 1);
            if (tfAlpha > 0) { ctx.fillStyle = "rgba("+color+","+tfAlpha+")"; ctx.fillRect(0,0,W,H); }
          }

          const alpha = Math.min(1, prog * 5);
          drawCaption(ctx, scene.caption || "", W, H, alpha, captionStyle || "bold", 96);

          ctx.globalAlpha = 0.7; ctx.fillStyle = pal.accent;
          ctx.fillRect((W-W*0.55)/2, H*0.915, W*0.55*prog, 6);
          ctx.globalAlpha = 1;

          if (watermark) {
            ctx.save();
            ctx.font = "bold 52px Arial, sans-serif";
            ctx.fillStyle = "rgba(255,255,255,0.15)";
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.translate(W/2, H/2); ctx.rotate(-Math.PI/7);
            ctx.fillText("VIRALFY.APP", 0, 0);
            ctx.restore();
          }

          done++;
          onPct(Math.round((done / totalFrames) * 100));

          const elapsed = performance.now() - frameStart;
          const wait = Math.max(0, FRAME_MS - elapsed);
          await new Promise(r => setTimeout(r, wait));
        }
      }

      onPct(99);
      rec.requestData();
      await new Promise(r => setTimeout(r, 400));
      stream.getTracks().forEach(t => t.stop());

      await new Promise((res, rej) => {
        rec.onstop = () => res();
        rec.onerror = () => rej(new Error("MediaRecorder failed"));
        rec.stop();
      });

      await new Promise(r => setTimeout(r, 250));
      onPct(100);

      if (chunks.length === 0) throw new Error("No video data recorded");
      const blob = new Blob(chunks, { type: mime });
      if (blob.size < 2000) throw new Error("Video file too small — recording failed");

      return { url: URL.createObjectURL(blob), blob, mime };
    }

    /* ─────────────────────────── SAVE HELPER ─────────────────────────── */
    async function saveVideo(url, blob, mime, filename, showToast) {
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
      const ext = "webm";
      const fullName = filename + "." + ext;

      if (isIOS && navigator.share) {
        try {
          const file = new File([blob], fullName, { type: mime });
          const canShare = navigator.canShare && navigator.canShare({ files: [file] });
          if (canShare) {
            await navigator.share({ files: [file], title: "My Viralfy Video" });
            showToast("Tap 'Save to Files' or 'Photos' in the share sheet 📲");
            return;
          }
        } catch(e) {
          if (e.name === "AbortError") return;
        }
      }

      if (!isIOS && navigator.share && navigator.canShare) {
        try {
          const file = new File([blob], fullName, { type: mime });
          if (navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: "My Viralfy Video" });
            showToast(isMobile ? "Save from the share sheet to your gallery 📲" : "✓ Video shared!");
            return;
          }
        } catch(e) {
          if (e.name === "AbortError") return;
        }
      }

      const a = document.createElement("a");
      a.href = url;
      a.download = fullName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      if (isMobile) {
        showToast("Saved to Downloads — open Files app to find it 📁");
      } else {
        showToast("✓ Video downloaded!");
      }
    }
